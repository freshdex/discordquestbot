<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 320px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    padding: 16px;
  }
  h1 {
    font-size: 14px;
    color: #7289da;
    margin-bottom: 12px;
  }
  .status {
    font-size: 12px;
    padding: 8px 10px;
    border-radius: 6px;
    margin-bottom: 12px;
    background: #16213e;
  }
  .status.found { border-left: 3px solid #43b581; }
  .status.waiting { border-left: 3px solid #faa61a; }
  .token-preview {
    font-family: monospace;
    font-size: 11px;
    color: #999;
    word-break: break-all;
    margin-top: 6px;
  }
  .actions { display: flex; gap: 8px; }
  button {
    flex: 1;
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.85; }
  button:active { opacity: 0.7; }
  #copyBtn {
    background: #7289da;
    color: white;
  }
  #saveBtn {
    background: #43b581;
    color: white;
  }
  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .hint {
    font-size: 11px;
    color: #666;
    margin-top: 10px;
    line-height: 1.4;
  }
</style>
</head>
<body>
  <h1>Discord Quest Token</h1>
  <div id="status" class="status waiting">
    Checking...
  </div>
  <div class="actions">
    <button id="copyBtn" disabled>Copy Token</button>
    <button id="saveBtn" disabled>Save .token</button>
  </div>
  <div id="hint" class="hint"></div>
  <script src="popup.js"></script>
</body>
</html>
